# Training configuration
batch_size: 40  # Batch size
output_directory: "./results/2a9-1var-S4+MRTS"  # Output directory for checkpoints and logs
ckpt_iter: "max"  # Checkpoint mode (max or min)
iters_per_ckpt: 500  # Checkpoint frequency (number of epochs)
iters_per_logging: 200  # Log frequency (number of iterations)
n_iters: 500  # Maximum number of iterations
learning_rate: 0.0010  # Learning rate

# Additional training settings
only_generate_missing: true  # Generate missing values only
use_model: 2  # Model to use for training
masking: "forecast"  # Masking strategy for missing values
missing_k: 10  # Number of missing values

# Data paths
data:
  train_path: "./datasets/2a9-1var/data_train_known_real.npy"  # Path to training data

# MRTS config, required
location_path: "./datasets/2a9-1var/stations_known_locations.npy"  # Path to known locations